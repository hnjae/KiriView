  "**/*.md",
  ".biome.json",
  ".clang-format",
  ".editorconfig",
  ".envrc",
  ".gitignore",
  ".rumdl.toml",
  ".typos.toml",
  ".yamlfmt.yaml",
  "Cargo.lock",
  "Cargo.toml",
  "cargo-sources.json",
  "cog.toml",
  "devenv.lock",
  "devenv.yaml",
  "org.hnjae.kiriview.desktop",
  "org.hnjae.kiriview.json",
  "justfile",
  "opencode.jsonc",
  "po/**/*.po",
  "statix.toml",
