# yaml-language-server: $schema=https://devenv.sh/devenv.schema.json
---
imports:
  - ./nix/devenv/git-hooks.nix
inputs:
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  nixpkgs:
    url: https://flakehub.com/f/DeterminateSystems/nixpkgs-weekly/0.1
allowUnfree: true
