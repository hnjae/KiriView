# yaml-language-server: $schema=https://devenv.sh/devenv.schema.json
---
require_version: ">= 2.1"
inputs:
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  nixpkgs:
    url: https://flakehub.com/f/DeterminateSystems/nixpkgs-weekly/0.1
  treefmt-nix:
    url: github:numtide/treefmt-nix
    inputs:
      nixpkgs:
        follows: nixpkgs
nixpkgs:
  allow_unfree: true
